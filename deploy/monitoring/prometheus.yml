global:
  scrape_interval: 30s

rule_files:
  - /etc/prometheus/prometheus-rules.yaml

scrape_configs:
  - job_name: autoloop
    metrics_path: /metrics
    static_configs:
      - targets:
          - autoloop:3000
  - job_name: browserless
    metrics_path: /metrics
    static_configs:
      - targets:
          - browserless:3000
