apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: autoloop-runtime-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: autoloop-secret-store
  target:
    name: autoloop-research-secrets
    creationPolicy: Owner
  data:
    - secretKey: firecrawl_api_key
      remoteRef:
        key: /autoloop/firecrawl/api-key
    - secretKey: browserless_token
      remoteRef:
        key: /autoloop/browserless/token
    - secretKey: openai_api_key
      remoteRef:
        key: /autoloop/openai/api-key
    - secretKey: proxy_provider_api_key
      remoteRef:
        key: /autoloop/proxy-provider/api-key
    - secretKey: alert_webhook_token
      remoteRef:
        key: /autoloop/alerting/webhook-token
